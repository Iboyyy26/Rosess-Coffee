<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosess Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0E0C0A;
    --gold:#C9A84C;
    --gold-dim:#8f7936;
    --cream:#F3EDE1;
    --cream-dim:#c9c0ab;
    --line: rgba(201,168,76,0.28);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--cream);
    font-family:'Montserrat', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  /* Signature element: topographic contour lines evoking 1,600 masl elevation */
  .contours{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.5;
    pointer-events:none;
  }
  .contours svg{ width:100%; height:100%; }
  .contours path{
    fill:none;
    stroke:var(--gold);
    stroke-width:0.6;
    opacity:0.16;
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:460px;
    padding:64px 28px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    animation:rise 0.9s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .eyebrow{
    font-family:'Montserrat', sans-serif;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:22px;
  }

  .mark{
    width:52px; height:52px;
    margin-bottom:22px;
  }

  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:44px;
    letter-spacing:0.04em;
    line-height:1.05;
    color:var(--cream);
  }

  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:400;
    font-size:17px;
    color:var(--cream-dim);
    margin-top:10px;
    letter-spacing:0.01em;
  }

  .origin{
    margin-top:20px;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-dim);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .origin::before, .origin::after{
    content:"";
    height:1px; width:26px;
    background:var(--line);
  }

  .links{
    width:100%;
    margin-top:46px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .link-card{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    padding:18px 20px;
    background:rgba(243,237,225,0.03);
    border:1px solid var(--line);
    border-radius:2px;
    text-decoration:none;
    color:var(--cream);
    text-align:left;
    transition:border-color 0.25s ease, background 0.25s ease, transform 0.2s ease;
  }
  .link-card:hover, .link-card:focus-visible{
    border-color:var(--gold);
    background:rgba(201,168,76,0.06);
    transform:translateY(-2px);
  }
  .link-card:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:3px;
  }

  .icon{
    flex:0 0 auto;
    width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line);
    border-radius:50%;
    color:var(--gold);
  }
  .icon svg{ width:18px; height:18px; }

  .link-text{ flex:1; }
  .link-title{
    font-family:'Montserrat', sans-serif;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:0.02em;
    color:var(--cream);
  }
  .link-sub{
    font-family:'Montserrat', sans-serif;
    font-weight:400;
    font-size:12px;
    color:var(--cream-dim);
    margin-top:2px;
  }

  .arrow{
    flex:0 0 auto;
    color:var(--gold-dim);
    font-size:16px;
    transition:transform 0.25s ease;
  }
  .link-card:hover .arrow{ transform:translateX(3px); color:var(--gold); }

  footer{
    margin-top:56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .footer-line{
    height:1px; width:40px;
    background:var(--line);
  }
  .footer-text{
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-dim);
  }

  @media (prefers-reduced-motion: reduce){
    .wrap{ animation:none; }
    .link-card{ transition:none; }
  }
</style>
</head>
